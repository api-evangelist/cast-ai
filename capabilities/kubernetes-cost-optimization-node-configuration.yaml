naftiko: 1.0.0-alpha2
info:
  label: CAST AI Kubernetes Cost Optimization API — Node Configuration
  description: 'CAST AI Kubernetes Cost Optimization API — Node Configuration. 3 operations. Lead operation: CAST AI List
    node configurations. Self-contained Naftiko capability covering one Cast Ai business surface.'
  tags:
  - Cast Ai
  - Node Configuration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CAST_AI_API_KEY: CAST_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: kubernetes-cost-optimization-node-configuration
    baseUri: https://api.cast.ai/v1
    description: CAST AI Kubernetes Cost Optimization API — Node Configuration business capability. Self-contained, no shared
      references.
    resources:
    - name: kubernetes-clusters-clusterId-node-configurations
      path: /kubernetes/clusters/{clusterId}/node-configurations
      operations:
      - name: nodeconfigurationapilistconfigurations
        method: GET
        description: CAST AI List node configurations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: nodeconfigurationapicreateconfiguration
        method: POST
        description: CAST AI Create node configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: kubernetes-clusters-clusterId-node-configurations-configurationId
      path: /kubernetes/clusters/{clusterId}/node-configurations/{configurationId}
      operations:
      - name: nodeconfigurationapideleteconfiguration
        method: DELETE
        description: CAST AI Delete node configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: configurationId
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.CAST_AI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: kubernetes-cost-optimization-node-configuration-rest
    port: 8080
    description: REST adapter for CAST AI Kubernetes Cost Optimization API — Node Configuration. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/kubernetes/clusters/{clusterid}/node-configurations
      name: kubernetes-clusters-clusterid-node-configurations
      description: REST surface for kubernetes-clusters-clusterId-node-configurations.
      operations:
      - method: GET
        name: nodeconfigurationapilistconfigurations
        description: CAST AI List node configurations
        call: kubernetes-cost-optimization-node-configuration.nodeconfigurationapilistconfigurations
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: nodeconfigurationapicreateconfiguration
        description: CAST AI Create node configuration
        call: kubernetes-cost-optimization-node-configuration.nodeconfigurationapicreateconfiguration
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/kubernetes/clusters/{clusterid}/node-configurations/{configurationid}
      name: kubernetes-clusters-clusterid-node-configurations-configurationid
      description: REST surface for kubernetes-clusters-clusterId-node-configurations-configurationId.
      operations:
      - method: DELETE
        name: nodeconfigurationapideleteconfiguration
        description: CAST AI Delete node configuration
        call: kubernetes-cost-optimization-node-configuration.nodeconfigurationapideleteconfiguration
        with:
          configurationId: rest.configurationId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kubernetes-cost-optimization-node-configuration-mcp
    port: 9090
    transport: http
    description: MCP adapter for CAST AI Kubernetes Cost Optimization API — Node Configuration. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: cast-ai-list-node-configurations
      description: CAST AI List node configurations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kubernetes-cost-optimization-node-configuration.nodeconfigurationapilistconfigurations
      outputParameters:
      - type: object
        mapping: $.
    - name: cast-ai-create-node-configuration
      description: CAST AI Create node configuration
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: kubernetes-cost-optimization-node-configuration.nodeconfigurationapicreateconfiguration
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: cast-ai-delete-node-configuration
      description: CAST AI Delete node configuration
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: kubernetes-cost-optimization-node-configuration.nodeconfigurationapideleteconfiguration
      with:
        configurationId: tools.configurationId
      outputParameters:
      - type: object
        mapping: $.
