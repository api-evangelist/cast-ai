naftiko: 1.0.0-alpha2
info:
  label: CAST AI Kubernetes Cost Optimization API — AI Enabler
  description: 'CAST AI Kubernetes Cost Optimization API — AI Enabler. 2 operations. Lead operation: CAST AI Get LLM providers.
    Self-contained Naftiko capability covering one Cast Ai business surface.'
  tags:
  - Cast Ai
  - AI Enabler
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CAST_AI_API_KEY: CAST_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: kubernetes-cost-optimization-ai-enabler
    baseUri: https://api.cast.ai/v1
    description: CAST AI Kubernetes Cost Optimization API — AI Enabler business capability. Self-contained, no shared references.
    resources:
    - name: llm-providers
      path: /llm/providers
      operations:
      - name: aienablerprovidersapigetproviders
        method: GET
        description: CAST AI Get LLM providers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: aienablerprovidersapiregisterproviders
        method: POST
        description: CAST AI Register LLM providers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.CAST_AI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: kubernetes-cost-optimization-ai-enabler-rest
    port: 8080
    description: REST adapter for CAST AI Kubernetes Cost Optimization API — AI Enabler. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/llm/providers
      name: llm-providers
      description: REST surface for llm-providers.
      operations:
      - method: GET
        name: aienablerprovidersapigetproviders
        description: CAST AI Get LLM providers
        call: kubernetes-cost-optimization-ai-enabler.aienablerprovidersapigetproviders
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: aienablerprovidersapiregisterproviders
        description: CAST AI Register LLM providers
        call: kubernetes-cost-optimization-ai-enabler.aienablerprovidersapiregisterproviders
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kubernetes-cost-optimization-ai-enabler-mcp
    port: 9090
    transport: http
    description: MCP adapter for CAST AI Kubernetes Cost Optimization API — AI Enabler. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: cast-ai-get-llm-providers
      description: CAST AI Get LLM providers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kubernetes-cost-optimization-ai-enabler.aienablerprovidersapigetproviders
      outputParameters:
      - type: object
        mapping: $.
    - name: cast-ai-register-llm-providers
      description: CAST AI Register LLM providers
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: kubernetes-cost-optimization-ai-enabler.aienablerprovidersapiregisterproviders
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
