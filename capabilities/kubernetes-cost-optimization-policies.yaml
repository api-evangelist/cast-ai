naftiko: 1.0.0-alpha2
info:
  label: CAST AI Kubernetes Cost Optimization API — Policies
  description: 'CAST AI Kubernetes Cost Optimization API — Policies. 2 operations. Lead operation: CAST AI Get cluster policies.
    Self-contained Naftiko capability covering one Cast Ai business surface.'
  tags:
  - Cast Ai
  - Policies
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CAST_AI_API_KEY: CAST_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: kubernetes-cost-optimization-policies
    baseUri: https://api.cast.ai/v1
    description: CAST AI Kubernetes Cost Optimization API — Policies business capability. Self-contained, no shared references.
    resources:
    - name: kubernetes-clusters-clusterId-policies
      path: /kubernetes/clusters/{clusterId}/policies
      operations:
      - name: policiesapigetclusterpolicies
        method: GET
        description: CAST AI Get cluster policies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: policiesapiupsertclusterpolicies
        method: PUT
        description: CAST AI Upsert cluster policies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.CAST_AI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: kubernetes-cost-optimization-policies-rest
    port: 8080
    description: REST adapter for CAST AI Kubernetes Cost Optimization API — Policies. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/kubernetes/clusters/{clusterid}/policies
      name: kubernetes-clusters-clusterid-policies
      description: REST surface for kubernetes-clusters-clusterId-policies.
      operations:
      - method: GET
        name: policiesapigetclusterpolicies
        description: CAST AI Get cluster policies
        call: kubernetes-cost-optimization-policies.policiesapigetclusterpolicies
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: policiesapiupsertclusterpolicies
        description: CAST AI Upsert cluster policies
        call: kubernetes-cost-optimization-policies.policiesapiupsertclusterpolicies
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kubernetes-cost-optimization-policies-mcp
    port: 9090
    transport: http
    description: MCP adapter for CAST AI Kubernetes Cost Optimization API — Policies. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: cast-ai-get-cluster-policies
      description: CAST AI Get cluster policies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kubernetes-cost-optimization-policies.policiesapigetclusterpolicies
      outputParameters:
      - type: object
        mapping: $.
    - name: cast-ai-upsert-cluster-policies
      description: CAST AI Upsert cluster policies
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: kubernetes-cost-optimization-policies.policiesapiupsertclusterpolicies
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
