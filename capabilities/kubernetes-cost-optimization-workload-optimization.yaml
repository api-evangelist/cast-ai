      outputParameters:
      - type: object
        mapping: $.
    - name: cast-ai-get-workload
      description: CAST AI Get workload
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kubernetes-cost-optimization-workload-optimization.workloadoptimizationapigetworkload
      with:
        workloadId: tools.workloadId
      outputParameters:
      - type: object
        mapping: $.
