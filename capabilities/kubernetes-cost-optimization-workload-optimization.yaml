    resources:
    - path: /v1/workload-autoscaling/agent-statuses
      name: workload-autoscaling-agent-statuses
      description: REST surface for workload-autoscaling-agent-statuses.
      operations:
      - method: GET
        name: workloadoptimizationapigetorganizationagentstatuses
        description: CAST AI Get agent statuses
        call: kubernetes-cost-optimization-workload-optimization.workloadoptimizationapigetorganizationagentstatuses
