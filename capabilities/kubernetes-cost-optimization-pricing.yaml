naftiko: 1.0.0-alpha2
info:
  label: CAST AI Kubernetes Cost Optimization API — Pricing
  description: 'CAST AI Kubernetes Cost Optimization API — Pricing. 2 operations. Lead operation: CAST AI Get node pricing.
    Self-contained Naftiko capability covering one Cast Ai business surface.'
  tags:
  - Cast Ai
  - Pricing
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CAST_AI_API_KEY: CAST_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: kubernetes-cost-optimization-pricing
    baseUri: https://api.cast.ai/v1
    description: CAST AI Kubernetes Cost Optimization API — Pricing business capability. Self-contained, no shared references.
    resources:
    - name: pricing-clusters-clusterId-nodes-nodeId
      path: /pricing/clusters/{clusterId}/nodes/{nodeId}
      operations:
      - name: pricingapigetnodepricing
        method: GET
        description: CAST AI Get node pricing
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pricing-sync-gcp-billing
      path: /pricing/sync-gcp-billing
      operations:
      - name: pricingapisyncgcpbillingapidata
        method: POST
        description: CAST AI Sync GCP billing data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.CAST_AI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: kubernetes-cost-optimization-pricing-rest
    port: 8080
    description: REST adapter for CAST AI Kubernetes Cost Optimization API — Pricing. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/pricing/clusters/{clusterid}/nodes/{nodeid}
      name: pricing-clusters-clusterid-nodes-nodeid
      description: REST surface for pricing-clusters-clusterId-nodes-nodeId.
      operations:
      - method: GET
        name: pricingapigetnodepricing
        description: CAST AI Get node pricing
        call: kubernetes-cost-optimization-pricing.pricingapigetnodepricing
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pricing/sync-gcp-billing
      name: pricing-sync-gcp-billing
      description: REST surface for pricing-sync-gcp-billing.
      operations:
      - method: POST
        name: pricingapisyncgcpbillingapidata
        description: CAST AI Sync GCP billing data
        call: kubernetes-cost-optimization-pricing.pricingapisyncgcpbillingapidata
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kubernetes-cost-optimization-pricing-mcp
    port: 9090
    transport: http
    description: MCP adapter for CAST AI Kubernetes Cost Optimization API — Pricing. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: cast-ai-get-node-pricing
      description: CAST AI Get node pricing
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kubernetes-cost-optimization-pricing.pricingapigetnodepricing
      outputParameters:
      - type: object
        mapping: $.
    - name: cast-ai-sync-gcp-billing
      description: CAST AI Sync GCP billing data
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: kubernetes-cost-optimization-pricing.pricingapisyncgcpbillingapidata
      outputParameters:
      - type: object
        mapping: $.
