apis:
  - name: CAST AI Kubernetes Cost Optimization API
    description: >-
      The CAST AI REST API provides comprehensive access to the Kubernetes
      cost optimization platform, including cluster management, autoscaling
      policies, node configuration and templates, workload optimization,
      scheduled rebalancing, cost reporting, security insights, hibernation
      schedules, and AI enabler functionality. The API uses API key
      authentication and is available at api.cast.ai.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://docs.cast.ai/docs/api
    baseURL: https://api.cast.ai/v1
    tags:
