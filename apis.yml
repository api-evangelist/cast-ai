name: CAST AI
description: >-
  CAST AI is a Kubernetes cost optimization and automation platform that
  provides APIs for managing clusters, autoscaling, node configuration,
  workload optimization, cost reporting, security insights, and more. The
  platform continuously monitors Kubernetes clusters and optimizes them for
  cost efficiency using autoscaling, spot instance automation, bin packing,
  and other techniques. Everything available in the console UI is also
  accessible via the REST API.
