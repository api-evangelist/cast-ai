      - url: json-schema/cost-report.json
        type: JSONSchema
      - url: json-ld/cast-ai-context.jsonld
        type: JSONLD
    description: >-
      The CAST AI REST API provides comprehensive access to the Kubernetes
      cost optimization platform: cluster management, autoscaling and
      Karpenter integration, node configuration and templates, workload
      rightsizing, scheduled rebalancing, cost reporting, security insights,
      hibernation schedules, AI enabler / LLM workload optimization, and
      GPU/OMNI compute features. Authentication uses API keys and the API is
      served at api.cast.ai.
