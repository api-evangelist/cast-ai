position: Consumer
description: >-
  CAST AI is an Application Performance Automation (APA) platform for
  Kubernetes that automates cost optimization, autoscaling, workload
  rightsizing, GPU/LLM workload placement, spot instance selection, and
  security posture analysis. The platform works across AWS, GCP, Azure,
  Oracle Cloud, IBM Cloud, AliCloud and on-premises distributions (EKS,
  GKE, AKS, OpenShift, Rancher, kOps). Everything available in the console
  UI is also accessible via the REST API at api.cast.ai.
